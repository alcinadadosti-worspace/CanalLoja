services:
  - type: web
    name: canalloja
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Senha do acesso único (vê tudo). Opcional sobrescrever; sem essa var
      # usa a padrão "canalloja". Gere com `npm run hash -- <senha>`.
      - key: USER_EQUIPE_HASH
        sync: false
      # Senha mestra do Admin (sobe planilhas). Default = "admin".
      # Gere com `npm run hash -- <senha>` e cole aqui.
      - key: ADMIN_PASSWORD_HASH
        sync: false
      # Supabase — persistencia de planilhas e metas
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Slack — preencher quando integrar o bot
      - key: SLACK_WEBHOOK_URL
        sync: false
