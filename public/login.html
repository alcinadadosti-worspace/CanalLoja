<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar · Resultado Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0e;
  --bg-2: #181816;
  --bg-3: #1f1f1c;
  --ink: #f4f1ea;
  --ink-mute: #a8a39a;
  --ink-dim: #6e6a62;
  --line: #2a2925;
  --accent: #e7c46c;
  --accent-2: #d97757;
  --red: #d35454;
}
* { box-sizing: border-box; }
body {
  margin: 0; min-height: 100vh; background: var(--bg);
  color: var(--ink); font-family: 'Inter Tight', -apple-system, sans-serif;
  display: flex; align-items: center; justify-content: center;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(231,196,108,0.08), transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(217,119,87,0.06), transparent 50%);
}
.card {
  background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px;
  padding: 38px 36px; width: 100%; max-width: 380px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.35), 0 3px 8px rgba(0,0,0,0.22);
}
.brand {
  font-family: 'Fraunces', Georgia, serif; font-size: 32px; font-weight: 800;
  margin-bottom: 6px; letter-spacing: -0.02em;
}
.brand .accent { color: var(--accent); }
.tagline {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--ink-mute); letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 28px;
}
label {
  display: block; font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--ink-mute); letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 6px;
}
input {
  width: 100%; background: var(--bg-3); color: var(--ink);
  border: 1px solid var(--line); border-radius: 4px;
  padding: 10px 12px; font-size: 14px; font-family: inherit;
  transition: border-color 150ms, box-shadow 150ms;
}
input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(231,196,108,0.15);
}
.field { margin-bottom: 16px; }
button {
  width: 100%; background: var(--accent); color: #1a1815;
  border: none; border-radius: 4px; padding: 12px;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background 150ms, transform 100ms;
}
button:hover { background: #f0d088; }
button:active { transform: scale(0.98); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-admin {
  width: 100%; background: transparent; color: var(--ink-mute);
  border: 1px dashed var(--line); border-radius: 4px; padding: 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: border-color 150ms, color 150ms;
  letter-spacing: 0.05em; text-transform: uppercase; margin-top: 12px;
}
.btn-admin:hover { border-color: var(--accent); color: var(--accent); }
.error {
  margin-top: 14px; padding: 10px 12px; background: rgba(211,84,84,0.1);
  border: 1px solid rgba(211,84,84,0.3); border-radius: 4px;
  color: var(--red); font-size: 13px; display: none;
}
.error.show { display: block; }
.hint {
  margin-top: 22px; padding-top: 18px; border-top: 1px dashed var(--line);
  font-size: 11px; color: var(--ink-dim); font-family: 'JetBrains Mono', monospace;
  line-height: 1.5;
}
.hint strong { color: var(--ink-mute); }
</style>
</head>
<body>
<div class="card">
  <div class="brand">Resultado<span class="accent"> diário</span></div>
  <div class="tagline">Entrar · CP Loja</div>

  <form id="loginForm" autocomplete="off">
    <div class="field">
      <label for="u">Usuário</label>
      <input id="u" type="text" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label for="p">Senha</label>
      <input id="p" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit" id="submitBtn">Entrar</button>
    <div class="error" id="error"></div>
  </form>

  <button type="button" class="btn-admin" onclick="window.location.href='/admin.html'">Entrar como Admin</button>

  <div class="hint">
    <strong>Acesso restrito.</strong> Consulte sua gestora para credenciais.
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const errorEl = document.getElementById('error');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.classList.remove('show');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Entrando…';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('u').value,
        password: document.getElementById('p').value,
      }),
    });
    if (!r.ok) {
      errorEl.textContent = 'Usuário ou senha incorretos.';
      errorEl.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Entrar';
      return;
    }
    window.location.href = '/';
  } catch (err) {
    errorEl.textContent = 'Erro de conexão: ' + err.message;
    errorEl.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
